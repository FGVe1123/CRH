{% extends "plantilla.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 card shadow p-4">
        <h2 class="text-center mb-4">Evaluación de Riesgo</h2>
        <form action="/predict" method="POST">
            <div class="mb-3">
                <label class="form-label">Sexo</label>
                <input type="number" name="sexo" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Edad</label>
                <input type="number" name="edad" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Peso</label>
                <input type="number" name="peso" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Estatura</label>
                <input type="number" name="estatura" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Tension Arterial (Alta)</label>
                <input type="number" name="tension_arterial" class="form-control" placeholder="Ej: 120" required>
            </div>
            
            <button type="submit" class="btn btn-primary w-100">Analizar Datos</button>
        </form>
    </div>
</div>
{% endblock %}

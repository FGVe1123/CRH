<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--RESPONSIVE-->
    <title>{% block title %}CRH - Clasificador de Riesgo de Hipertensión{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .navbar { margin-bottom: 30px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark text-bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">CRH</a>
            <div>
                <a href="/" class="text-white me-3">Inicio</a>
                <a href="/formulario" class="text-white me-3">Formulario</a>
                <a href="/dashboard" class="text-white">Resultados y estadísticas</a>
            </div>
        </div>

    </nav>

    <div class="container card-body shadow-lg">
        {% block content %}{% endblock %}
    </div>

    <footer class="text-center mt-5 py-3 text-muted card-footer shadow-sm">
        <p>&copy; CRH - Clasificador de Riesgo de Hipertensión</p>
    </footer>
</body>
</html>
